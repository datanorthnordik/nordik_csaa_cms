name: CI

on:
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test:unit:ci

  e2e:
    name: E2E tests (Cypress)
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install-command: npm ci
          start: npm start
          wait-on: http://localhost:5173
          browser: chrome
